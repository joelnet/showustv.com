name: CI / Deploy

# CI on pull requests and pushes to main; deploy to Cloudflare on merges to
# main (issue #28). Feature branches are checked via their PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  deploy:
    name: Deploy to Cloudflare
    needs: check
    # Only real pushes to main deploy — never PRs (which can't read secrets anyway).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize deploys so two merges can't race the migration + upload.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # wrangler deploy serves ./dist/client as static assets, so build first.
      - run: npm run build
      # Additive migrations apply before the new code goes live. Non-interactive
      # runs auto-confirm.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply showustv --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
